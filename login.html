<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteVision - Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-white flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-900 to-slate-800">

<div class="glass p-8 rounded-2xl w-full max-w-md">

<h2 class="text-2xl font-bold text-center mb-6">Welcome to NoteVision</h2>

<form onsubmit="return false;">

<input id="email" type="email" placeholder="Email"
class="w-full p-3 mb-3 bg-white/10 rounded outline-none">

<input id="password" type="password" placeholder="Password"
class="w-full p-3 mb-4 bg-white/10 rounded outline-none">

<button type="button" onclick="loginUser()" class="btn-gradient w-full p-3 rounded mb-2">
Login
</button>

<button type="button" onclick="signupUser()" class="w-full p-3 rounded bg-white/10">
Sign Up
</button>

</form>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
